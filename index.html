<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杏ちゃんの佐古小ナビ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: url('bg.jpg') center 40% / cover no-repeat fixed;
      min-height: 100vh;
      margin: 0;
    }

    /* === PC: 左サイドバー === */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 220px;
      background: rgba(74,144,217,0.9);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      padding: 2rem 0;
      z-index: 10;
    }
    .sidebar-title {
      color: #fff;
      font-size: 1.4rem;
      font-weight: bold;
      padding: 0 1.2rem 1.5rem;
      line-height: 1.5;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      margin-bottom: 1rem;
    }
    .sidebar-link {
      color: #fff;
      text-decoration: none;
      font-size: 1.3rem;
      font-weight: bold;
      padding: 1rem 1.2rem;
      text-align: center;
      display: block;
      transition: background 0.15s;
    }
    .sidebar-link:hover {
      background: rgba(255,255,255,0.2);
    }
    .main-area {
      margin-left: 220px;
      min-height: 100vh;
    }

    /* === モバイルヘッダー+ハンバーガー（PC非表示） === */
    .mobile-header {
      display: none;
    }
    .hamburger {
      display: none;
    }
    .menu-overlay {
      display: none;
    }

    /* === スマホ === */
    @media (max-width: 600px) {
      body {
        background-position: center 30%;
      }

      /* サイドバー非表示 */
      .sidebar { display: none; }
      .main-area { margin-left: 0; }

      /* モバイルヘッダー */
      .mobile-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: fixed;
        top: 0; left: 0; right: 0;
        background: rgba(74,144,217,0.9);
        backdrop-filter: blur(6px);
        padding: 0.7rem 1rem;
        z-index: 20;
      }
      .mobile-header-title {
        color: #fff;
        font-size: 1.1rem;
        font-weight: bold;
      }

      /* ハンバーガーボタン */
      .hamburger {
        display: flex;
        flex-direction: column;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px;
        z-index: 30;
      }
      .hamburger span {
        display: block;
        width: 24px;
        height: 3px;
        background: #fff;
        border-radius: 2px;
        transition: transform 0.3s, opacity 0.3s;
      }
      .hamburger.active span:nth-child(1) {
        transform: translateY(8px) rotate(45deg);
      }
      .hamburger.active span:nth-child(2) {
        opacity: 0;
      }
      .hamburger.active span:nth-child(3) {
        transform: translateY(-8px) rotate(-45deg);
      }

      /* メニューオーバーレイ */
      .menu-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(74,144,217,0.95);
        z-index: 15;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
      .menu-overlay.active {
        display: flex;
      }
      .menu-overlay a {
        color: #fff;
        text-decoration: none;
        font-size: 1.5rem;
        font-weight: bold;
        padding: 1rem 2rem;
        border-radius: 8px;
        transition: background 0.15s;
      }
      .menu-overlay a:hover {
        background: rgba(255,255,255,0.2);
      }

      .main-area {
        padding-top: 50px;
      }
    }
  </style>
</head>
<body>

<!-- PC: サイドバー -->
<nav class="sidebar">
  <div class="sidebar-title">杏ちゃんの<br>佐古小ナビ ❤️</div>
  <a href="junbi.html" class="sidebar-link">🎒 準備</a>
  <a href="gakushu.html" class="sidebar-link">📖 学習</a>
  <a href="gyoji.html" class="sidebar-link">🗓 行事</a>
  <a href="nikka.html" class="sidebar-link">🕐 日課</a>
  <a href="gakudo.html" class="sidebar-link">📩 安否</a>
  <a href="todo.html" class="sidebar-link">✅ To Do</a>
  <a href="memo.html" class="sidebar-link">📝 メモ</a>
</nav>

<!-- スマホ: ヘッダー+ハンバーガー -->
<div class="mobile-header">
  <span class="mobile-header-title">杏ちゃんの佐古小ナビ ❤️</span>
  <button class="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
</div>

<!-- スマホ: メニューオーバーレイ -->
<div class="menu-overlay" id="menuOverlay">
  <a href="junbi.html">🎒 準備</a>
  <a href="gakushu.html">📖 学習</a>
  <a href="gyoji.html">🗓 行事</a>
  <a href="nikka.html">🕐 日課</a>
  <a href="gakudo.html">📩 安否</a>
  <a href="todo.html">✅ To Do</a>
  <a href="memo.html">📝 メモ</a>
</div>

<div class="main-area"></div>

<script>
function toggleMenu() {
  document.querySelector('.hamburger').classList.toggle('active');
  document.getElementById('menuOverlay').classList.toggle('active');
}
</script>
</body>
</html>
