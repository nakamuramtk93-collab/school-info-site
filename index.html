<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学校連絡事項</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: url('bg.jpg') center 30% / cover no-repeat fixed;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.3);
      z-index: 0;
    }
    header, .container, footer { position: relative; z-index: 1; }
    header {
      background: rgba(74,144,217,0.8);
      backdrop-filter: blur(4px);
    }
    .container { padding-top: 1rem; }
    .menu-grid {
      grid-template-columns: repeat(4, 1fr) !important;
      gap: 0.8rem !important;
    }
    .menu-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      min-height: 130px !important;
      padding: 1.2rem 0.8rem !important;
    }
    .menu-icon { font-size: 2.2rem !important; margin-bottom: 0.5rem !important; }
    .menu-title { font-size: 0.95rem !important; }
    .menu-desc { font-size: 0.7rem !important; }
    footer { color: #555; }

    @media (max-width: 600px) {
      .menu-grid { grid-template-columns: repeat(2, 1fr) !important; }
      body { background-position: center 20%; }
    }
  </style>
</head>
<body>

<header>
  <h1>杏ちゃん❤️　佐古小学校　スケジュール管理表</h1>
</header>

<div class="container">
  <div class="menu-grid">

    <a href="junbi.html" class="menu-card">
      <div class="menu-icon">📦</div>
      <div class="menu-title">準備物・提出物・記名</div>
      <div class="menu-desc">持ち物チェックリスト・提出書類・記名のしかた</div>
    </a>

    <a href="gakushu.html" class="menu-card">
      <div class="menu-icon">📖</div>
      <div class="menu-title">学習予定</div>
      <div class="menu-desc">週間スケジュール・時間割・重要なお知らせ</div>
    </a>

    <a href="gyoji.html" class="menu-card">
      <div class="menu-icon">🗓</div>
      <div class="menu-title">今月の行事</div>
      <div class="menu-desc">4月の行事予定・担任紹介・保護者へのお知らせ</div>
    </a>

    <a href="nikka.html" class="menu-card">
      <div class="menu-icon">⏰</div>
      <div class="menu-title">日課表</div>
      <div class="menu-desc">通常日課・短縮日課・朝の活動内容</div>
    </a>

  </div>
</div>


</body>
</html>
