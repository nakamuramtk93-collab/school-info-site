<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杏ちゃんの佐古小ナビ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: url('bg.jpg') center 30% / cover no-repeat fixed;
      min-height: 100vh;
    }
    .nav-bar {
      display: flex;
      align-items: center;
      background: rgba(74,144,217,0.85);
      backdrop-filter: blur(4px);
      padding: 0.6rem 1.5rem;
      gap: 0;
    }
    .nav-title {
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      margin-right: auto;
      white-space: nowrap;
    }
    .nav-link {
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: bold;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .nav-link:hover {
      background: rgba(255,255,255,0.2);
    }

    @media (max-width: 600px) {
      .nav-bar {
        flex-wrap: wrap;
        padding: 0.5rem 1rem;
        gap: 0.2rem;
      }
      .nav-title {
        width: 100%;
        margin-bottom: 0.3rem;
        font-size: 1rem;
      }
      .nav-link {
        font-size: 0.85rem;
        padding: 0.4rem 0.7rem;
      }
      body { background-position: center 20%; }
    }
  </style>
</head>
<body>

<nav class="nav-bar">
  <span class="nav-title">杏ちゃんの佐古小ナビ ❤️</span>
  <a href="junbi.html" class="nav-link">📦 準備</a>
  <a href="gakushu.html" class="nav-link">📖 学習</a>
  <a href="gyoji.html" class="nav-link">🗓 行事</a>
  <a href="nikka.html" class="nav-link">⏰ 日課</a>
</nav>

</body>
</html>
