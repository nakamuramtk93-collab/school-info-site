<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杏ちゃんの佐古小ナビ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: url('bg.jpg') center 40% / cover no-repeat fixed;
      min-height: 100vh;
      margin: 0;
    }
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 220px;
      background: rgba(74,144,217,0.9);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      padding: 2rem 0;
      z-index: 10;
    }
    .sidebar-title {
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      padding: 0 1.2rem 1.5rem;
      line-height: 1.5;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      margin-bottom: 1rem;
    }
    .sidebar-link {
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: bold;
      padding: 0.8rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: background 0.15s;
    }
    .sidebar-link:hover {
      background: rgba(255,255,255,0.2);
    }
    .main-area {
      margin-left: 220px;
      min-height: 100vh;
    }

    @media (max-width: 600px) {
      body {
        background-size: cover;
        background-position: center 30%;
      }
      .sidebar {
        position: fixed;
        left: 0; right: 0; bottom: 0; top: auto;
        width: 100%;
        height: auto;
        flex-direction: row;
        padding: 0;
        justify-content: space-around;
      }
      .sidebar-title { display: none; }
      .sidebar-link {
        flex-direction: column;
        font-size: 0.75rem;
        padding: 0.5rem 0.3rem;
        gap: 0.2rem;
        flex: 1;
        justify-content: center;
        text-align: center;
      }
      .main-area {
        margin-left: 0;
        padding-bottom: 60px;
      }
    }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-title">杏ちゃんの<br>佐古小ナビ ❤️</div>
  <a href="junbi.html" class="sidebar-link">📦 準備</a>
  <a href="gakushu.html" class="sidebar-link">📖 学習</a>
  <a href="gyoji.html" class="sidebar-link">🗓 行事</a>
  <a href="nikka.html" class="sidebar-link">⏰ 日課</a>
</nav>

<div class="main-area"></div>

</body>
</html>
